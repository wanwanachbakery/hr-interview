<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>สรุปบันทึกงาน | HR-Interview</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <style>
    .rp-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:8px; margin-bottom:16px; }
    .rp-controls select, .rp-controls input { padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; font-family:inherit; font-size:14px; box-sizing:border-box; width:100%; }
    .rp-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin-bottom:20px; }
    .rp-card { background:#f8fafc; border-radius:10px; padding:12px 14px; }
    .rp-card .lbl { font-size:12px; color:#64748b; }
    .rp-card .val { font-size:24px; font-weight:600; margin-top:2px; }
    .rp-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
    .rp-bar-row .name { width:150px; font-size:13px; }
    .rp-track { flex:1; height:14px; background:#f1f5f9; border-radius:999px; overflow:hidden; }
    .rp-fill { height:100%; background:#378ADD; }
    .rp-table { width:100%; border-collapse:collapse; font-size:13px; }
    .rp-table th { text-align:left; font-weight:600; color:#475569; padding:7px 8px; border-bottom:2px solid #e2e8f0; font-size:13px; }
    .rp-table td { padding:7px 8px; border-bottom:1px solid #f1f5f9; }
    .rp-chip { font-size:11px; padding:2px 8px; border-radius:6px; white-space:nowrap; }
    .rp-good { background:#dcfce7; color:#166534; }
    .rp-ok   { background:#fef9c3; color:#854d0e; }
    .rp-low  { background:#fee2e2; color:#991b1b; }
    .rp-none { background:#f1f5f9; color:#64748b; }
  </style>
<script>
  window.TENANT_ID = (location.pathname.match(/^\/t\/([^/]+)/) || [])[1] || '';
  window.TBASE = window.TENANT_ID ? '/t/' + window.TENANT_ID : '';
  function shouldPrefix(href) {
    return href && href.startsWith('/')
      && !href.startsWith('/t/') && !href.startsWith('/super')
      && !href.startsWith('/styles') && !href.startsWith('/logo')
      && !href.startsWith('/i18n') && !href.startsWith('/favicon');
  }
  function rewriteLinks(root) {
    if (!window.TBASE || !root) return;
    if (root.nodeType === 1 && root.tagName === 'A' && shouldPrefix(root.getAttribute('href'))) {
      root.setAttribute('href', window.TBASE + root.getAttribute('href'));
    }
    if (typeof root.querySelectorAll === 'function') {
      root.querySelectorAll('a[href^="/"]').forEach(a => {
        const h = a.getAttribute('href');
        if (shouldPrefix(h)) a.setAttribute('href', window.TBASE + h);
      });
    }
  }
  window.rewriteLinks = rewriteLinks;
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.TBASE) return;
    rewriteLinks(document);
    new MutationObserver(muts => {
      for (const m of muts) { rewriteLinks(m.target); for (const node of m.addedNodes) rewriteLinks(node); }
    }).observe(document.body, { childList: true, subtree: true });
    const logo = document.querySelector('.topbar .logo');
    if (logo && !document.getElementById('tenant-company-name')) {
      const span = document.createElement('span');
      span.id = 'tenant-company-name';
      span.style.cssText = 'color:#0369a1; font-size:14px; font-weight:600; margin-left:12px; padding-left:12px; border-left:1px solid #cbd5e1;';
      span.textContent = '...';
      logo.appendChild(span);
      fetch(window.TBASE + '/api/company').then(r => r.ok ? r.json() : null).then(c => {
        span.textContent = c && c.name ? c.name : '';
        if (!c || !c.name) span.style.display = 'none';
      }).catch(() => { span.style.display = 'none'; });
    }
  });
</script>
  <script src="/app-shell.js?v=3"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="logo"><span>HR-Interview</span></div>
    <nav>
      <a href="/">หน้าแรก</a>
      <a href="/worklog">📝 บันทึกงาน</a>
      <a href="/worklog-team">👥 บันทึกงานทีม</a>
      <a href="/worklog-report">📈 สรุปบันทึกงาน</a>
      <a href="/dashboard">📋 Dashboard</a>
      <a href="#" onclick="(async()=>{await fetch(TBASE + '/api/logout',{method:'POST'});location.href = TBASE + '/login';})();return false;">ออกจากระบบ</a>
    </nav>
  </div>

  <div class="card">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
      <span style="font-size:24px;">📈</span>
      <div>
        <h1 style="margin:0;">สรุปบันทึกงาน</h1>
        <p class="sub" id="rp-range" style="margin:2px 0 0;">—</p>
      </div>
    </div>

    <div id="rp-main">
      <div class="rp-controls">
        <select id="rp-preset">
          <option value="month" selected>เดือนนี้</option>
          <option value="week">สัปดาห์นี้</option>
          <option value="d7">7 วันล่าสุด</option>
          <option value="d30">30 วันล่าสุด</option>
          <option value="custom">กำหนดเอง</option>
        </select>
        <input type="date" id="rp-from"/>
        <input type="date" id="rp-to"/>
        <select id="rp-div"><option value="">ทุกฝ่าย</option></select>
        <select id="rp-sec"><option value="">ทุกแผนก</option></select>
      </div>

      <div id="rp-result"><p class="sub">กำลังโหลด...</p></div>
    </div>
  </div>
</div>

<script>
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const pad = n => String(n).padStart(2, '0');
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const today = new Date();
const elPreset = document.getElementById('rp-preset');
const elFrom = document.getElementById('rp-from');
const elTo = document.getElementById('rp-to');
const elDiv = document.getElementById('rp-div');
const elSec = document.getElementById('rp-sec');
const STATUS = { good: ['ดี', 'rp-good'], ok: ['พอใช้', 'rp-ok'], low: ['ต่ำ', 'rp-low'], none: ['ยังไม่บันทึก', 'rp-none'] };
let lastMembers = [];

function applyPreset(p) {
  const t = new Date();
  let from = ymd(t), to = ymd(t);
  if (p === 'month') from = `${t.getFullYear()}-${pad(t.getMonth() + 1)}-01`;
  else if (p === 'week') { const d = new Date(t); const off = (d.getDay() + 6) % 7; d.setDate(d.getDate() - off); from = ymd(d); }
  else if (p === 'd7') { const d = new Date(t); d.setDate(d.getDate() - 6); from = ymd(d); }
  else if (p === 'd30') { const d = new Date(t); d.setDate(d.getDate() - 29); from = ymd(d); }
  else return; // custom: leave as-is
  elFrom.value = from; elTo.value = to;
}

async function loadReport() {
  const result = document.getElementById('rp-result');
  result.innerHTML = '<p class="sub">กำลังโหลด...</p>';
  const qs = `from=${elFrom.value}&to=${elTo.value}&division_id=${encodeURIComponent(elDiv.value)}&section_id=${encodeURIComponent(elSec.value)}`;
  let d;
  try { d = await fetch(`${TBASE}/api/worklog/report?${qs}`).then(r => r.json()); }
  catch (e) { result.innerHTML = '<p class="sub" style="color:#b91c1c;">โหลดรายงานไม่สำเร็จ</p>'; return; }
  if (d.applicable === false) {
    document.getElementById('rp-main').innerHTML =
      '<p class="sub" style="padding:16px 0;">เมนูนี้สำหรับหัวหน้า/ผู้ดูแลระบบ</p>';
    return;
  }
  document.getElementById('rp-range').textContent = `${fmt(d.from)} – ${fmt(d.to)} · ${d.dayCount} วัน`;
  lastMembers = d.members || [];
  const t = d.totals;
  const cards = `
    <div class="rp-cards">
      <div class="rp-card"><div class="lbl">ความครบเฉลี่ย</div><div class="val">${t.avgCompleteness}%</div></div>
      <div class="rp-card"><div class="lbl">ชั่วโมงบันทึกรวม</div><div class="val">${t.filledHours}</div></div>
      <div class="rp-card"><div class="lbl">% งานซ้ำ</div><div class="val">${t.recurringPct}%</div></div>
      <div class="rp-card"><div class="lbl">คนที่บันทึก</div><div class="val">${t.peopleLogged}/${t.peopleTotal}</div></div>
      <div class="rp-card"><div class="lbl">วันทำงานในช่วง</div><div class="val">${d.workDays != null ? d.workDays : d.dayCount}</div><div class="lbl" style="font-size:11px;">(ตัดวันหยุดบริษัทแล้ว)</div></div>
    </div>`;
  const maxPct = Math.max(1, ...(d.byCategory || []).map(c => c.pct));
  const cats = (d.byCategory || []).length ? `
    <div style="font-weight:500; margin:4px 0 10px; display:flex; align-items:center; gap:6px;">⏱️ สัดส่วนงานแยกตามหมวดหมู่</div>
    ${d.byCategory.map(c => `
      <div class="rp-bar-row">
        <span class="name" title="${esc(c.category)}">${esc(c.category)}</span>
        <div class="rp-track"><div class="rp-fill" style="width:${Math.round(c.pct / maxPct * 100)}%; ${c.category === 'ไม่ระบุ' ? 'background:#85B7EB;' : ''}"></div></div>
        <span style="width:72px; text-align:right; font-size:13px;">${c.pct}% · ${c.count} งาน</span>
      </div>`).join('')}` : '<p class="sub">ยังไม่มีข้อมูลบันทึกในช่วงนี้</p>';
  const rows = lastMembers.map(m => {
    const [label, cls] = STATUS[m.status] || STATUS.none;
    const wd = (m.expectedDays != null)
      ? `${m.loggedDays}/${m.expectedDays}` +
        (m.leaveDays ? ` <span style="color:#0d9488; font-size:12px;">(ลา ${m.leaveDays})</span>` : '') +
        (m.missingDays ? ` <span style="color:#b91c1c; font-size:12px;">ขาด ${m.missingDays}</span>` : '')
      : '–';
    return `<tr>
      <td>${esc(m.name)} <span style="color:#64748b; font-size:12px;">· ${esc(m.position_name || '-')}</span></td>
      <td style="text-align:right;">${m.filledHours}</td>
      <td style="text-align:center;">${wd}</td>
      <td><div style="display:flex; align-items:center; gap:6px;"><div class="rp-track" style="height:8px;"><div class="rp-fill" style="width:${m.avgCompleteness}%; background:${m.status === 'good' ? '#1D9E75' : m.status === 'ok' ? '#EF9F27' : m.status === 'low' ? '#E24B4A' : '#cbd5e1'};"></div></div><span style="width:38px; text-align:right;">${m.avgCompleteness}%</span></div></td>
      <td style="text-align:center;"><span class="rp-chip ${cls}">${label}</span></td>
    </tr>`;
  }).join('');
  const table = `
    <div style="display:flex; align-items:center; justify-content:space-between; margin:18px 0 8px; gap:10px;">
      <div style="font-weight:500; display:flex; align-items:center; gap:6px;">📋 อัตราการบันทึกรายคน</div>
      <button class="ghost" id="rp-csv" style="font-size:13px;">⬇️ ดาวน์โหลด CSV</button>
    </div>
    <div style="overflow-x:auto;"><table class="rp-table">
      <thead><tr><th>ชื่อ</th><th style="width:74px; text-align:right;">ชั่วโมง</th><th style="width:150px; text-align:center;">วันทำงาน (บันทึก/ทั้งหมด)</th><th style="width:170px;">ความครบเฉลี่ย</th><th style="width:84px; text-align:center;">สถานะ</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" style="text-align:center; color:#94a3b8; padding:12px;">ไม่มีคนในขอบเขต</td></tr>'}</tbody>
    </table></div>`;
  result.innerHTML = cards + cats + table;
  const csvBtn = document.getElementById('rp-csv');
  if (csvBtn) csvBtn.addEventListener('click', downloadCsv);
}

function fmt(d) { if (!d) return ''; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; }

function downloadCsv() {
  const head = ['ชื่อ', 'ตำแหน่ง', 'ฝ่าย', 'แผนก', 'ชั่วโมงบันทึก', 'วันบันทึก', 'วันทำงานที่คาดหวัง', 'วันลา', 'วันขาด', 'ความครบเฉลี่ย%', 'สถานะ'];
  const esc2 = s => { const v = String(s ?? ''); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const lines = [head.join(',')].concat(lastMembers.map(m =>
    [m.name, m.position_name, m.division_name, m.section_name, m.filledHours, (m.loggedDays != null ? m.loggedDays : m.daysLogged), (m.expectedDays != null ? m.expectedDays : ''), (m.leaveDays || 0), (m.missingDays || 0), m.avgCompleteness, (STATUS[m.status] || STATUS.none)[0]].map(esc2).join(',')));
  const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `worklog-report_${elFrom.value}_${elTo.value}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function populateFilters() {
  try {
    const [divs, secs] = await Promise.all([
      fetch(TBASE + '/api/divisions').then(r => r.json()).catch(() => []),
      fetch(TBASE + '/api/sections').then(r => r.json()).catch(() => []),
    ]);
    elDiv.innerHTML = '<option value="">ทุกฝ่าย</option>' + (divs || []).map(d => `<option value="${esc(d.id)}">${esc(d.name)}</option>`).join('');
    elSec.innerHTML = '<option value="">ทุกแผนก</option>' + (secs || []).map(s => `<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('');
  } catch (e) {}
}

elPreset.addEventListener('change', () => { applyPreset(elPreset.value); loadReport(); });
elFrom.addEventListener('change', () => { elPreset.value = 'custom'; if (elFrom.value > elTo.value) elTo.value = elFrom.value; loadReport(); });
elTo.addEventListener('change', () => { elPreset.value = 'custom'; if (elTo.value > ymd(today)) elTo.value = ymd(today); loadReport(); });
elDiv.addEventListener('change', loadReport);
elSec.addEventListener('change', loadReport);

(async function init() {
  elFrom.max = ymd(today); elTo.max = ymd(today);
  applyPreset('month');
  await populateFilters();
  loadReport();
})();
</script>
</body>
</html>
