<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ผลลัพธ์ | HR-Interview</title>
  <link rel="stylesheet" href="/styles.css?v=2"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <script src="/i18n.js"></script>
<script>
  // Multi-tenant: derive /t/{tenantId} prefix from URL and apply to <a href="/...">
  window.TENANT_ID = (location.pathname.match(/^\/t\/([^/]+)/) || [])[1] || '';
  window.TBASE = window.TENANT_ID ? '/t/' + window.TENANT_ID : '';
  // Date helpers — Christian Era (ค.ศ.), DD/MM/YYYY, 24-hour HH:MM
  window.formatDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso); if (isNaN(d.getTime())) return '';
    const p = (n) => String(n).padStart(2, '0');
    return p(d.getDate()) + '/' + p(d.getMonth() + 1) + '/' + d.getFullYear();
  };
  window.formatTime = (iso) => {
    if (!iso) return '';
    const d = new Date(iso); if (isNaN(d.getTime())) return '';
    const p = (n) => String(n).padStart(2, '0');
    return p(d.getHours()) + ':' + p(d.getMinutes());
  };
  window.formatDateTime = (iso) => {
    if (!iso) return '';
    const d = window.formatDate(iso), t = window.formatTime(iso);
    return d && t ? d + ' ' + t : (d || t);
  };
  function shouldPrefix(href) {
    return href && href.startsWith('/')
      && !href.startsWith('/t/') && !href.startsWith('/super')
      && !href.startsWith('/styles') && !href.startsWith('/logo')
      && !href.startsWith('/i18n') && !href.startsWith('/favicon');
  }
  function rewriteLinks(root) {
    if (!window.TBASE || !root) return;
    // Self — handles addedNodes that ARE the <a> (e.g. innerHTML="<a>...</a>").
    // Only Element nodes have tagName; Document (nodeType 9) doesn't but still has querySelectorAll.
    if (root.nodeType === 1 && root.tagName === 'A' && shouldPrefix(root.getAttribute('href'))) {
      root.setAttribute('href', window.TBASE + root.getAttribute('href'));
    }
    // Descendants — both Document and Element expose querySelectorAll
    if (typeof root.querySelectorAll === 'function') {
      root.querySelectorAll('a[href^="/"]').forEach(a => {
        const h = a.getAttribute('href');
        if (shouldPrefix(h)) a.setAttribute('href', window.TBASE + h);
      });
    }
  }
  window.rewriteLinks = rewriteLinks;
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.TBASE) return;
    rewriteLinks(document);
    // Catch links inserted later via innerHTML/appendChild
    new MutationObserver(muts => {
      for (const m of muts) {
        // m.target is the element whose children changed — re-scan its subtree
        rewriteLinks(m.target);
        // m.addedNodes are the new direct children — also scan each (handles self-A case)
        for (const node of m.addedNodes) rewriteLinks(node);
      }
    }).observe(document.body, { childList: true, subtree: true });
    // Show tenant company name in topbar (next to the HR-Interview brand)
    const logo = document.querySelector('.topbar .logo');
    if (logo && !document.getElementById('tenant-company-name')) {
      const span = document.createElement('span');
      span.id = 'tenant-company-name';
      span.style.cssText = 'color:#0369a1; font-size:14px; font-weight:600; margin-left:12px; padding-left:12px; border-left:1px solid #cbd5e1;';
      span.textContent = '...';
      logo.appendChild(span);
      fetch(window.TBASE + '/api/company').then(r => r.ok ? r.json() : null).then(c => {
        span.textContent = c && c.name ? c.name : '';
        if (!c || !c.name) span.style.display = 'none';
      }).catch(() => { span.style.display = 'none'; });
    }
  });
</script>
  <script src="/md.js"></script>
  <script src="/app-shell.js"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="logo"><span>HR-Interview</span></div>
    <nav>
      <a href="/" data-i18n="nav_home">หน้าแรก</a>
      <a href="/examples" data-i18n="nav_examples">📘 ตัวอย่าง</a>
      <a href="/dashboard">📋 Dashboard</a>
      <a href="/worklog">📝 บันทึกงาน</a>
      <a href="/worklog-team">👥 บันทึกงานทีม</a>
      <a href="/worklog-report">📈 สรุปบันทึกงาน</a>
      <a href="#" onclick="(async()=>{await fetch(TBASE + '/api/logout',{method:'POST'});location.href = TBASE + '/login';})();return false;" data-i18n="nav_logout">ออกจากระบบ</a>
    </nav>
  </div>

  <h1 id="title">...</h1>
  <p class="sub" id="sub"></p>

  <div class="doc-jump" id="doc-jump"></div>

  <div id="docs"></div>

  <div class="card">
    <h2 style="margin-top:0;" data-i18n="rv_answers_h2">สรุปคำตอบทั้งหมด</h2>
    <div id="answers"></div>
  </div>

  <div style="display:flex; gap:8px; margin-top:16px;">
    <a href="/"><button class="ghost" data-i18n="rv_back">← กลับหน้าแรก</button></a>
    <a href="/dashboard"><button data-i18n="rv_to_dashboard">ไป Dashboard →</button></a>
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const id = qs.get('id');
if (!id) location.href = TBASE + '/';

const T = (k, v) => (window.I18N ? window.I18N.t(k, v) : k);
function esc(s){return String(s||'').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

// The 6 generated documents, in a presentation-friendly order.
const DOCS = [
  { file:'job-description.md',   icon:'📋', title:'Job Description',                 type:'md'  },
  { file:'kpi.md',               icon:'🎯', title:'KPI — ตัวชี้วัด',                 type:'md'  },
  { file:'optimization.md',      icon:'🚀', title:'Optimization — ข้อเสนอปรับปรุง',  type:'md'  },
  { file:'workflow.md',          icon:'🗂️', title:'Workflow — ขั้นตอนงานประจำวัน',   type:'md'  },
  { file:'workflow-diagram.md',  icon:'🔀', title:'ผังงาน (Flowchart)',              type:'md'  },
  { file:'workflow.csv',         icon:'📊', title:'ตารางงาน (เปิดใน Excel)',          type:'csv' },
];

// Minimal CSV parser (handles quoted fields + escaped "") -> rows of cells.
function parseCsv(text){
  const rows = []; let row = [], field = '', q = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (q){
      if (c === '"'){ if (text[i+1] === '"'){ field += '"'; i++; } else q = false; }
      else field += c;
    } else if (c === '"'){ q = true; }
    else if (c === ','){ row.push(field); field = ''; }
    else if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
    else if (c !== '\r'){ field += c; }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0] === ''));
}
function csvToTable(text){
  const rows = parseCsv(text);
  if (!rows.length) return '<p class="empty">ไม่มีข้อมูล</p>';
  const head = rows[0], body = rows.slice(1);
  let t = '<table class="md-table"><thead><tr>' + head.map(c => `<th>${esc(c)}</th>`).join('') + '</tr></thead><tbody>';
  for (const r of body){ t += '<tr>' + r.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>'; }
  return t + '</tbody></table>';
}

// Build card skeletons + jump links
document.getElementById('docs').innerHTML = DOCS.map((d, i) => `
  <div class="doc-card" id="doc-${i}">
    <div class="doc-head">
      <h2>${d.icon} ${esc(d.title)}</h2>
      <a class="doc-open" href="${TBASE}/api/outputs/${encodeURIComponent(id)}/${d.file}" target="_blank">เปิดไฟล์ ↗</a>
    </div>
    <div class="doc-content md-body" id="doc-content-${i}"><p class="sub">กำลังโหลด…</p></div>
  </div>`).join('');
document.getElementById('doc-jump').innerHTML =
  DOCS.map((d, i) => `<a href="#doc-${i}">${d.icon} ${esc(d.title)}</a>`).join('');

// Load + render each document
DOCS.forEach(async (d, i) => {
  const el = document.getElementById('doc-content-' + i);
  try {
    const r = await fetch(`${TBASE}/api/outputs/${encodeURIComponent(id)}/${d.file}`);
    if (!r.ok){ el.innerHTML = '<p class="empty">ยังไม่มีไฟล์นี้</p>'; return; }
    const txt = await r.text();
    if (d.type === 'csv') el.innerHTML = csvToTable(txt);
    else el.innerHTML = window.renderMarkdown ? window.renderMarkdown(txt)
      : `<pre style="white-space:pre-wrap;">${esc(txt)}</pre>`;
  } catch { el.innerHTML = '<p class="empty">โหลดไม่สำเร็จ</p>'; }
});

// Header + answers
fetch(`${TBASE}/api/interview/${id}`).then(r=>r.json()).then(iv => {
  const e = iv.employee;
  const titleTxt = T('rv_heading_tpl', { name: e.name });
  document.getElementById('title').textContent =
    (titleTxt && titleTxt !== 'rv_heading_tpl') ? titleTxt : ('📄 เอกสารของ ' + e.name);
  document.getElementById('sub').textContent =
    `${e.role} · ${e.department || ''} · ${formatDateTime(iv.finishedAt || iv.startedAt)}`;

  const rows = iv.answers.map(a => `
    <div style="padding:10px 0; border-bottom:1px solid #e2e8f0;">
      <div style="font-size:12px; color:#64748b; text-transform:uppercase;">${esc(a.key)}</div>
      <div style="margin-top:4px; white-space:pre-wrap;">${esc(a.value)}</div>
    </div>
  `).join('');
  document.getElementById('answers').innerHTML = rows || `<p class="empty">${T('empty_no_data')}</p>`;
});
</script>
</body>
</html>
