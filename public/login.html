<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>เข้าสู่ระบบ | AI Interviewer</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<div style="max-width:420px; margin:80px auto; padding:0 16px;">
  <div style="text-align:center; margin-bottom:24px;">
    <div style="font-size:48px;">🤖</div>
    <h1 style="margin:8px 0 4px;">AI Interviewer</h1>
    <p class="sub">ระบบอินเทอร์วิวพนักงาน — JIANCHA</p>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">🔐 เข้าสู่ระบบ</h2>
    <p class="sub">ใช้รหัสของฝ่ายคุณเอง หรือรหัส admin เพื่อเข้าดูทุกอย่าง</p>
    <form id="login-form">
      <label>รหัสผ่าน</label>
      <input name="password" type="text" required autofocus autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"/>
      <div id="err" style="color:#b91c1c; font-size:14px; margin-top:8px; display:none;"></div>
      <div style="margin-top:16px;">
        <button type="submit" style="width:100%;">เข้าสู่ระบบ →</button>
      </div>
    </form>
  </div>

  <p class="sub" style="text-align:center; font-size:12px; margin-top:16px;">
    ถ้าไม่รู้รหัสของฝ่าย ติดต่อ admin หรือผู้จัดการแผนก
  </p>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target).entries());
  const err = document.getElementById('err');
  err.style.display = 'none';
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const d = await r.json().catch(()=>({error:'error'}));
    err.textContent = d.error || 'รหัสไม่ถูกต้อง';
    err.style.display = 'block';
    return;
  }
  location.href = '/';
});
</script>
</body>
</html>
