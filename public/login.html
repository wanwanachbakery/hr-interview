<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>เข้าสู่ระบบ | AI Interviewer</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <script src="/i18n.js"></script>
</head>
<body>
<div style="max-width:420px; margin:80px auto; padding:0 16px;">
  <div style="text-align:center; margin-bottom:24px;">
    <img src="/logo.png" alt="JIANCHA" class="login-logo-img"/>
    <h1 style="margin:8px 0 4px;">AI Interviewer</h1>
    <p class="sub" data-i18n="login_app_sub">ระบบอินเทอร์วิวพนักงาน — JIANCHA</p>
  </div>

  <div class="card">
    <h2 style="margin-top:0;" data-i18n="login_heading">🔐 เข้าสู่ระบบ</h2>
    <p class="sub" data-i18n="login_sub">ใช้รหัสของฝ่ายคุณเอง หรือรหัส admin เพื่อเข้าดูทุกอย่าง</p>
    <form id="login-form">
      <label data-i18n="login_password">รหัสผ่าน</label>
      <input name="password" type="text" required autofocus autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"/>
      <div id="err" style="color:#b91c1c; font-size:14px; margin-top:8px; display:none;"></div>
      <div style="margin-top:16px;">
        <button type="submit" style="width:100%;" data-i18n="login_submit">เข้าสู่ระบบ →</button>
      </div>
    </form>
  </div>

  <p class="sub" style="text-align:center; font-size:12px; margin-top:16px;" data-i18n="login_hint">
    ถ้าไม่รู้รหัสของฝ่าย ติดต่อ admin หรือผู้จัดการแผนก
  </p>

  <div style="text-align:center; margin-top:24px;"><span id="lang-switcher"></span></div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target).entries());
  const err = document.getElementById('err');
  err.style.display = 'none';
  const r = await fetch('/api/login', {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const d = await r.json().catch(()=>({error:'error'}));
    const T = (k) => (window.I18N ? window.I18N.t(k) : k);
    err.textContent = d.error || T('login_err');
    err.style.display = 'block';
    return;
  }
  location.href = '/';
});
</script>
</body>
</html>
