<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>หน้าแรก | HR-WWN</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <style>
    .iv-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:24px;
               border-top:4px solid #ec4899; margin-bottom:16px; }
    .iv-status { display:inline-block; padding:4px 12px; border-radius:999px; font-size:13px; font-weight:600; }
    .iv-not_started { background:#fef3c7; color:#92400e; }
    .iv-in_progress { background:#dbeafe; color:#1e40af; }
    .iv-completed   { background:#dcfce7; color:#166534; }
    .iv-archived    { background:#f1f5f9; color:#475569; }
    .iv-missing     { background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body>
<div class="container wide">
  <div class="topbar">
    <div class="logo">
      <span>HR-WWN</span>
      <span id="role-badge" class="pill gray" style="font-size:11px;"></span>
    </div>
    <nav>
      <a href="/">หน้าแรก</a>
      <a href="/profile">👤 โปรไฟล์</a>
      <a href="/reports">📊 รายงาน</a>
      <a href="/admin" id="nav-admin" style="display:none;">🔐 Admin</a>
      <a href="#" onclick="logout();return false;">ออกจากระบบ</a>
    </nav>
  </div>

  <h1 id="hello">สวัสดี</h1>
  <p class="sub" id="company-name">–</p>

  <!-- My Interview anchor card (non-admin) -->
  <div class="iv-card" id="iv-card" style="display:none;">
    <h2 style="margin:0 0 8px;">🎤 อินเทอร์วิวของฉัน</h2>
    <p class="sub" id="iv-meta" style="margin:0 0 12px;">–</p>
    <div id="iv-action">
      <span class="iv-status iv-not_started">รอตอบ</span>
    </div>
  </div>

  <div class="card" id="my-card">
    <h2 style="margin-top:0;">👤 ข้อมูลของฉัน</h2>
    <div id="my-info" class="row" style="font-size:15px;">กำลังโหลด...</div>
    <div style="margin-top:12px;">
      <a href="/profile"><button class="ghost">✏️ แก้ไขโปรไฟล์ / เวลาทำงาน</button></a>
    </div>
  </div>

  <div class="grid" style="grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));">
    <a href="/profile" class="div-card" style="border-top-color:#0ea5e9;">
      <div class="icon">👤</div>
      <div class="name">โปรไฟล์ของฉัน</div>
      <div class="meta">แก้เวลาทำงาน · เปลี่ยนรหัสผ่าน</div>
    </a>
    <a href="/dashboard" class="div-card" style="border-top-color:#ec4899;">
      <div class="icon">📋</div>
      <div class="name">ดูสถานะของทีม</div>
      <div class="meta">ใครตอบ interview แล้ว / ยังไม่ตอบ</div>
    </a>
    <a href="/reports" class="div-card" style="border-top-color:#10b981;">
      <div class="icon">📊</div>
      <div class="name">รายงาน</div>
      <div class="meta">ข้อมูลตามสิทธิ์ของคุณ</div>
    </a>
    <a href="/admin" id="admin-card" class="div-card" style="display:none; border-top-color:#f59e0b;">
      <div class="icon">🔐</div>
      <div class="name">Admin Console</div>
      <div class="meta">จัดการระบบทั้งหมด</div>
    </a>
  </div>
</div>

<script>
const ROLE_LABEL = {
  admin:'ผู้ดูแลระบบ', executive:'ผู้บริหาร', manager:'ผู้จัดการ',
  division_head:'หัวหน้าฝ่าย', section_head:'หัวหน้าแผนก', officer:'เจ้าหน้าที่',
};
const STATUS_LABEL = {
  not_started: 'ยังไม่ตอบ', in_progress: 'กำลังตอบ', completed: 'เสร็จแล้ว',
};
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

(async function init() {
  const [me, co] = await Promise.all([
    fetch('/api/me').then(r => r.json()),
    fetch('/api/company').then(r => r.json()),
  ]);
  document.getElementById('hello').textContent = 'สวัสดี ' + (me.name || me.username || '');
  document.getElementById('company-name').textContent = co.name || '';
  const badge = document.getElementById('role-badge');
  badge.textContent = ROLE_LABEL[me.role] || me.role;
  if (me.role === 'admin') { badge.className = 'pill blue'; }
  else if (me.role === 'executive') { badge.className = 'pill green'; }
  else { badge.className = 'pill gray'; }

  if (me.role === 'admin') {
    document.getElementById('nav-admin').style.display = 'inline';
    document.getElementById('admin-card').style.display = 'flex';
    document.getElementById('my-card').style.display = 'none';
    return;
  }

  const [profile, emp] = await Promise.all([
    fetch('/api/me/profile').then(r => r.json()).catch(() => null),
    fetch('/api/me/employee').then(r => r.json()).catch(() => null),
  ]);

  // Interview anchor card
  const ivCard = document.getElementById('iv-card');
  const ivMeta = document.getElementById('iv-meta');
  const ivAction = document.getElementById('iv-action');
  ivCard.style.display = 'block';
  if (!emp) {
    ivMeta.innerHTML = `<span class="iv-status iv-missing">ยังไม่มี employee record</span> &nbsp; ตำแหน่งของคุณยังไม่ครบ — ติดต่อ admin ให้กรอก ฝ่าย/แผนก/ตำแหน่ง`;
    ivAction.innerHTML = '';
  } else {
    const statusKey = emp.interviewStatus || 'not_started';
    const statusTxt = STATUS_LABEL[statusKey] || statusKey;
    ivMeta.innerHTML = `ตำแหน่ง: <strong>${esc(emp.role)}</strong> · ฝ่าย ${esc(emp.division_name)} / แผนก ${esc(emp.section_name)} · สถานะ <span class="iv-status iv-${statusKey}">${esc(statusTxt)}</span>`;
    if (statusKey === 'completed') {
      ivAction.innerHTML = `<a href="/review?id=${encodeURIComponent(emp.id)}"><button>📄 ดูเอกสารของฉัน (JD/KPI)</button></a>`;
    } else {
      const btnText = statusKey === 'in_progress' ? '▶ ตอบต่อจากที่ค้างไว้' : '▶ เริ่มอินเทอร์วิว';
      ivAction.innerHTML = `<a href="/interview?id=${encodeURIComponent(emp.id)}"><button>${btnText}</button></a>`;
    }
  }

  const info = document.getElementById('my-info');
  info.innerHTML = `
    <div><span class="sub">Username:</span> <strong>${esc(me.username)}</strong></div>
    <div><span class="sub">สิทธิ์:</span> <strong>${esc(ROLE_LABEL[me.role])}</strong></div>
    <div><span class="sub">ฝ่าย:</span> <strong>${esc(me.division_name || '–')}</strong></div>
    <div><span class="sub">แผนก:</span> <strong>${esc(me.section_name || '–')}</strong></div>
    <div><span class="sub">ตำแหน่ง:</span> <strong>${esc(me.position_name || '–')}</strong></div>
    <div><span class="sub">เวลาทำงาน:</span> <strong>${esc(profile?.work_start || '–')}–${esc(profile?.work_end || '–')}</strong> <span class="sub" style="font-size:13px;">(พัก ${esc(profile?.break_start || '–')}–${esc(profile?.break_end || '–')})</span></div>
  `;
})();

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login';
}
</script>
</body>
</html>
