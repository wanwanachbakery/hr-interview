<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>อินเทอร์วิว | AI Interviewer</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <script src="/i18n.js"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="logo"><img src="/logo.png" alt="JIANCHA" class="logo-img"/><span class="logo-sub" data-i18n="brand">AI Interviewer</span></div>
    <nav>
      <a href="/" data-i18n="nav_home">หน้าแรก</a>
      <a href="/examples" target="_blank" data-i18n="nav_examples">📘 ตัวอย่าง</a>
      <a href="#" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});location.href='/login';})();return false;" data-i18n="nav_logout">ออกจากระบบ</a>
    </nav>
  </div>

  <div id="header" class="card">
    <h1 id="emp-name">...</h1>
    <p class="sub" id="emp-info"></p>
    <div class="progress"><div id="prog-bar" style="width:0%"></div></div>
    <p class="hint" id="prog-text"></p>
  </div>

  <!-- Schedule picker shown only when starting a brand-new interview -->
  <div class="card" id="schedule-card" style="display:none;">
    <h2 data-i18n="iv_start_title">ก่อนเริ่ม — เลือกเวลาทำงานของคุณ</h2>
    <p class="sub" data-i18n="iv_start_sub">เวลาที่คุณเลือกจะใช้กำหนดคำถามรายชั่วโมง (ข้ามพักเที่ยงอัตโนมัติ)</p>
    <form id="schedule-form" class="schedule-picker" autocomplete="off"></form>
    <div style="text-align:right; margin-top:8px;">
      <button type="button" id="schedule-submit" data-i18n="iv_start_btn">เริ่มอินเทอร์วิว →</button>
    </div>
  </div>

  <div class="card" id="chat-card" style="display:none;">
    <div class="chat" id="chat"></div>
    <form id="answer-form">
      <textarea id="answer" data-i18n-placeholder="iv_placeholder" placeholder="พิมพ์คำตอบที่นี่..." required></textarea>
      <div style="margin-top:12px; display:flex; gap:8px; justify-content:space-between; align-items:center;">
        <p class="hint" data-i18n="iv_hint">กด Enter เพื่อส่ง / Shift+Enter เพื่อขึ้นบรรทัดใหม่</p>
        <div>
          <button type="button" class="ghost" id="skip-btn" data-i18n="iv_skip">ข้าม →</button>
          <button type="submit" data-i18n="iv_submit">ส่งคำตอบ</button>
        </div>
      </div>
    </form>
    <div id="done-box" style="display:none; text-align:center; padding:24px;">
      <h2 data-i18n="iv_done_h2">🎉 อินเทอร์วิวเสร็จสิ้น</h2>
      <p class="sub" data-i18n="iv_done_sub">กดปุ่มด้านล่างเพื่อสร้างเอกสาร</p>
      <button id="finish-btn" data-i18n="iv_done_btn">สร้างเอกสาร →</button>
    </div>
  </div>
</div>

<script>
const qs = new URLSearchParams(location.search);
const empId = qs.get('id');
if (!empId) { location.href = '/'; }

const T = (k, v) => (window.I18N ? window.I18N.t(k, v) : k);

let currentKey = null;
let totalQuestions = 15;
let answered = 0;
let interviewLang = 'th';
let interviewSchedule = '09-18';

const chatEl = document.getElementById('chat');
const answerEl = document.getElementById('answer');
const form = document.getElementById('answer-form');
const doneBox = document.getElementById('done-box');
const scheduleCard = document.getElementById('schedule-card');
const chatCard = document.getElementById('chat-card');

function esc(s){return String(s||'').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function updateProgress() {
  const pct = Math.min(100, Math.round((answered / totalQuestions) * 100));
  document.getElementById('prog-bar').style.width = pct + '%';
  const tpl = T('iv_progress_tpl', { answered, total: totalQuestions });
  document.getElementById('prog-text').textContent = `${tpl} (${pct}%)`;
}

// ---------- Schedule picker ----------
async function renderSchedulePicker() {
  const lang = (window.I18N && window.I18N.getLang()) || 'th';
  const schedules = await fetch('/api/schedules?lang=' + lang).then(r => r.json());
  const formEl = document.getElementById('schedule-form');
  formEl.innerHTML = schedules.map((s, i) => `
    <label class="schedule-option${i===0?' selected':''}">
      <input type="radio" name="schedule" value="${esc(s.id)}" ${i===0?'checked':''}/>
      <span class="label">${esc(s.label)}</span>
    </label>
  `).join('');
  formEl.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener('change', () => {
      formEl.querySelectorAll('.schedule-option').forEach(el => el.classList.remove('selected'));
      r.closest('.schedule-option').classList.add('selected');
    });
  });
}

// ---------- Start flow ----------
async function fetchInterview(body) {
  const r = await fetch(`/api/interview/${empId}/start`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

async function beginAfterStart(data) {
  const e = data.interview.employee;
  document.getElementById('emp-name').textContent = e.name;
  document.getElementById('emp-info').textContent = `${e.role} · ${e.department || ''}`;
  interviewLang = data.interview.lang || 'th';
  interviewSchedule = data.interview.schedule || '09-18';
  answered = data.interview.answers.length;
  totalQuestions = data.questionTotal || estimateTotal(data);
  scheduleCard.style.display = 'none';
  chatCard.style.display = 'block';
  for (const a of data.interview.answers) addMsg('user', a.value);
  showQuestion(data.question);
  updateProgress();
}

// Rough estimator — server doesn't return total yet so infer from schedule + division bucket.
function estimateTotal(data) {
  // 1 intro + 8 hourly + 5 shared tail + up to 3 division-specific ~= 14-17
  return 17;
}

async function start() {
  // Peek at existing interview — if there are any answers OR it's a legacy interview,
  // resume straight into chat; otherwise show schedule picker first.
  const initial = await fetchInterview(null);
  const iv = initial.interview;
  const hasAnswers = iv.answers.length > 0;
  const isLegacy = !iv.lang && !iv.schedule;     // legacy interviews have neither field
  const resume = hasAnswers || isLegacy;
  if (resume) {
    await beginAfterStart(initial);
    return;
  }
  // Preload defaults from the interview record (server already defaulted them on create)
  _preloadSchedule = iv.schedule || '09-18';
  _preloadLang = iv.lang || ((window.I18N && window.I18N.getLang()) || 'th');
  await renderSchedulePicker();
  scheduleCard.style.display = 'block';
  chatCard.style.display = 'none';
}
let _preloadSchedule = '09-18';
let _preloadLang = 'th';

document.getElementById('schedule-submit').addEventListener('click', async () => {
  const chosen = document.querySelector('#schedule-form input[name=schedule]:checked');
  const schedule = chosen ? chosen.value : '09-18';
  const lang = (window.I18N && window.I18N.getLang()) || 'th';
  const data = await fetchInterview({ schedule, lang });
  await beginAfterStart(data);
});

document.addEventListener('langchange', async () => {
  // Re-render the schedule picker labels if still visible
  if (scheduleCard.style.display !== 'none') await renderSchedulePicker();
  // Re-render progress text (it uses a translated template)
  updateProgress();
});

// ---------- Chat flow ----------
function showQuestion(q) {
  if (q.done) {
    form.style.display = 'none';
    doneBox.style.display = 'block';
    addMsg('ai', T('iv_done_msg'));
    return;
  }
  currentKey = q.key;
  addMsg('ai', q.text);
  answerEl.focus();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const value = answerEl.value.trim();
  if (!value) return;
  await sendAnswer(value, false);
});

document.getElementById('skip-btn').addEventListener('click', async () => {
  await sendAnswer('(ข้าม / skip)', true);
});

async function sendAnswer(value, skipProbe) {
  addMsg('user', value);
  answerEl.value = '';
  const r = await fetch(`/api/interview/${empId}/message`, {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify({ key: currentKey, value, skipProbe }),
  });
  const data = await r.json();
  if (data.probe) {
    addMsg('ai', data.probe);
    return;
  }
  if (data.question) {
    answered++;
    updateProgress();
    showQuestion(data.question);
  }
}

answerEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});

document.getElementById('finish-btn').addEventListener('click', async () => {
  const btn = document.getElementById('finish-btn');
  btn.disabled = true; btn.textContent = T('iv_done_generating');
  const r = await fetch(`/api/interview/${empId}/finish`, { method: 'POST' });
  if (r.ok) location.href = `/review?id=${empId}`;
  else { alert(T('iv_error')); btn.disabled = false; btn.textContent = T('iv_done_btn'); }
});

start();
</script>
</body>
</html>
