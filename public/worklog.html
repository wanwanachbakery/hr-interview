<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>บันทึกงานประจำวัน | HR-Interview</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <style>
    .wl-wrap { overflow-x:auto; }
    .wl-table { width:100%; border-collapse:collapse; font-size:14px; margin-top:8px; min-width:560px; }
    .wl-table th { text-align:left; font-weight:600; color:#475569; padding:8px; border-bottom:2px solid #e2e8f0; font-size:13px; }
    .wl-table td { padding:6px 8px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .wl-table input[type=text], .wl-table select { width:100%; padding:7px 9px; border:1px solid #d1d5db; border-radius:8px; font-family:inherit; font-size:14px; box-sizing:border-box; background:#fff; }
    .wl-time { color:#64748b; white-space:nowrap; font-variant-numeric:tabular-nums; }
    .wl-prog-track { flex:1; height:8px; background:#e2e8f0; border-radius:999px; overflow:hidden; }
    .wl-prog-fill { height:100%; background:#0284c7; width:0%; transition:width .25s; }
    .wl-rec { cursor:pointer; border:1px solid #cbd5e1; background:#fff; color:#64748b; border-radius:999px; padding:4px 10px; font-size:12px; font-family:inherit; white-space:nowrap; }
    .wl-rec.on { background:#e0f2fe; border-color:#7dd3fc; color:#0369a1; font-weight:600; }
  </style>
<script>
  window.TENANT_ID = (location.pathname.match(/^\/t\/([^/]+)/) || [])[1] || '';
  window.TBASE = window.TENANT_ID ? '/t/' + window.TENANT_ID : '';
  function shouldPrefix(href) {
    return href && href.startsWith('/')
      && !href.startsWith('/t/') && !href.startsWith('/super')
      && !href.startsWith('/styles') && !href.startsWith('/logo')
      && !href.startsWith('/i18n') && !href.startsWith('/favicon');
  }
  function rewriteLinks(root) {
    if (!window.TBASE || !root) return;
    if (root.nodeType === 1 && root.tagName === 'A' && shouldPrefix(root.getAttribute('href'))) {
      root.setAttribute('href', window.TBASE + root.getAttribute('href'));
    }
    if (typeof root.querySelectorAll === 'function') {
      root.querySelectorAll('a[href^="/"]').forEach(a => {
        const h = a.getAttribute('href');
        if (shouldPrefix(h)) a.setAttribute('href', window.TBASE + h);
      });
    }
  }
  window.rewriteLinks = rewriteLinks;
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.TBASE) return;
    rewriteLinks(document);
    new MutationObserver(muts => {
      for (const m of muts) { rewriteLinks(m.target); for (const node of m.addedNodes) rewriteLinks(node); }
    }).observe(document.body, { childList: true, subtree: true });
    const logo = document.querySelector('.topbar .logo');
    if (logo && !document.getElementById('tenant-company-name')) {
      const span = document.createElement('span');
      span.id = 'tenant-company-name';
      span.style.cssText = 'color:#0369a1; font-size:14px; font-weight:600; margin-left:12px; padding-left:12px; border-left:1px solid #cbd5e1;';
      span.textContent = '...';
      logo.appendChild(span);
      fetch(window.TBASE + '/api/company').then(r => r.ok ? r.json() : null).then(c => {
        span.textContent = c && c.name ? c.name : '';
        if (!c || !c.name) span.style.display = 'none';
      }).catch(() => { span.style.display = 'none'; });
    }
  });
</script>
  <script src="/app-shell.js"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="logo"><span>HR-Interview</span></div>
    <nav>
      <a href="/">หน้าแรก</a>
      <a href="/profile">👤 โปรไฟล์</a>
      <a href="/worklog">📝 บันทึกงาน</a>
      <a href="/worklog-team">👥 บันทึกงานทีม</a>
      <a href="/worklog-report">📈 สรุปบันทึกงาน</a>
      <a href="/dashboard">📋 Dashboard</a>
      <a href="#" onclick="(async()=>{await fetch(TBASE + '/api/logout',{method:'POST'});location.href = TBASE + '/login';})();return false;">ออกจากระบบ</a>
    </nav>
  </div>

  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div>
        <h1 style="margin:0;">📝 บันทึกงานประจำวัน</h1>
        <p class="sub" id="wl-emp" style="margin:4px 0 0;">–</p>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <label for="wl-date" style="font-size:14px; color:#475569;">วันที่</label>
        <input type="date" id="wl-date" style="padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; font-family:inherit;"/>
      </div>
    </div>

    <div id="wl-remind-row" style="display:flex; align-items:center; gap:8px; margin-top:14px; font-size:14px; color:#475569;">
      <input type="checkbox" id="wl-remind" style="width:16px; height:16px;"/>
      <label for="wl-remind">🔔 เตือนฉันในแอปถ้ายังไม่ได้บันทึกงานวันนี้</label>
    </div>

    <div id="wl-tools-row" style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:14px; flex-wrap:wrap;">
      <div id="wl-progress-row" style="display:flex; align-items:center; gap:12px; flex:1; min-width:240px;">
        <span id="wl-progress-text" class="sub" style="white-space:nowrap;">–</span>
        <div class="wl-prog-track"><div class="wl-prog-fill" id="wl-progress-fill"></div></div>
        <span id="wl-progress-pct" style="font-weight:600; color:#0284c7;">0%</span>
      </div>
      <button class="ghost" id="wl-copy" style="font-size:13px;">📋 คัดลอกงานประจำจากเมื่อวาน</button>
    </div>

    <div class="wl-wrap"><div id="wl-body" style="margin-top:8px;"><p class="sub">กำลังโหลด...</p></div></div>

    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:18px; flex-wrap:wrap;">
      <p class="hint" style="margin:0; max-width:420px;">💡 ติ๊ก “งานประจำ” สำหรับงานที่ทำซ้ำทุกวัน → คัดลอกมาใช้วันถัดไปได้ และช่วยให้รายงานสรุปแม่นขึ้น</p>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="wl-saved-msg" class="sub" style="color:#16a34a;"></span>
        <button id="wl-save">💾 บันทึกงานวันนี้</button>
      </div>
    </div>
  </div>
</div>

<script>
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const ADD_NEW = '__add_new__';
const dateEl = document.getElementById('wl-date');
const bodyEl = document.getElementById('wl-body');
const savedMsg = document.getElementById('wl-saved-msg');
let categories = [];

function todayStr() { return new Date().toLocaleDateString('en-CA'); }

function catOptions(selected) {
  const opts = categories.map(c => `<option value="${esc(c)}"${c === selected ? ' selected' : ''}>${esc(c)}</option>`);
  // keep an unknown saved value selectable
  if (selected && !categories.includes(selected)) opts.unshift(`<option value="${esc(selected)}" selected>${esc(selected)}</option>`);
  opts.unshift(`<option value=""${!selected ? ' selected' : ''}>— เลือกหมวดหมู่ —</option>`);
  opts.push(`<option value="${ADD_NEW}" style="color:#0369a1;">+ เพิ่มหมวดหมู่ใหม่…</option>`);
  return opts.join('');
}

function recPill(on) {
  return `<button type="button" class="wl-rec${on ? ' on' : ''}" data-on="${on ? 1 : 0}">${on ? '⟳ ประจำ' : 'ครั้งเดียว'}</button>`;
}

function recomputeProgress() {
  const tasks = bodyEl.querySelectorAll('input[data-field="task"]');
  let total = 0, filled = 0;
  tasks.forEach(inp => { total++; if (inp.value.trim()) filled++; });
  const pct = total ? Math.round((filled / total) * 100) : 0;
  document.getElementById('wl-progress-text').textContent = `บันทึกแล้ว ${filled}/${total} ชั่วโมง`;
  document.getElementById('wl-progress-fill').style.width = pct + '%';
  document.getElementById('wl-progress-pct').textContent = pct + '%';
}

function renderTable(data) {
  if (data.applicable === false) {
    bodyEl.innerHTML = `<p class="sub" style="color:#b91c1c; padding:12px 0;">${esc(data.error || 'บัญชีนี้ไม่มีบันทึกงานส่วนตัว')}</p>`;
    ['wl-save','wl-copy'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    document.getElementById('wl-tools-row').style.display = 'none';
    document.getElementById('wl-remind-row').style.display = 'none';
    return;
  }
  const rows = data.entries.map(e => `
    <tr data-hour="${e.hour}">
      <td class="wl-time">${esc(e.label)}</td>
      <td><input type="text" data-field="task" value="${esc(e.task)}" placeholder="ทำอะไรในช่วงนี้..."/></td>
      <td><select data-field="category">${catOptions(e.category)}</select></td>
      <td style="text-align:center;">${recPill(e.recurring)}</td>
    </tr>`).join('');
  bodyEl.innerHTML = `
    <table class="wl-table">
      <thead><tr>
        <th style="width:110px;">เวลา</th><th>งานที่ทำ</th>
        <th style="width:180px;">หมวดหมู่</th><th style="width:104px; text-align:center;">งานประจำ</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  bindRowEvents();
  recomputeProgress();
}

function bindRowEvents() {
  bodyEl.querySelectorAll('input[data-field="task"]').forEach(inp => inp.addEventListener('input', recomputeProgress));
  bodyEl.querySelectorAll('select[data-field="category"]').forEach(sel => {
    sel.dataset.prev = sel.value;
    sel.addEventListener('change', () => {
      if (sel.value === ADD_NEW) { addCategory(sel); return; }
      sel.dataset.prev = sel.value;
    });
  });
  bodyEl.querySelectorAll('.wl-rec').forEach(btn => btn.addEventListener('click', () => {
    const on = btn.getAttribute('data-on') === '1';
    btn.setAttribute('data-on', on ? '0' : '1');
    btn.className = 'wl-rec' + (on ? '' : ' on');
    btn.textContent = on ? 'ครั้งเดียว' : '⟳ ประจำ';
  }));
}

async function addCategory(sel) {
  const name = (prompt('ชื่อหมวดหมู่ใหม่:') || '').trim();
  if (!name) { sel.value = sel.dataset.prev || ''; return; }
  try {
    const r = await fetch(`${TBASE}/api/worklog/categories`, {
      method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ name }),
    });
    const d = await r.json();
    if (!r.ok) { alert(d.error || 'เพิ่มหมวดหมู่ไม่สำเร็จ'); sel.value = sel.dataset.prev || ''; return; }
    categories = d.categories || categories;
    // rebuild every category select, preserving each row's current pick
    bodyEl.querySelectorAll('select[data-field="category"]').forEach(s => {
      const cur = (s === sel) ? name : (s.value === ADD_NEW ? (s.dataset.prev || '') : s.value);
      s.innerHTML = catOptions(cur);
      s.dataset.prev = cur;
    });
  } catch (e) { alert('เชื่อมต่อไม่สำเร็จ'); sel.value = sel.dataset.prev || ''; }
}

async function loadDay(date) {
  savedMsg.textContent = '';
  bodyEl.innerHTML = '<p class="sub">กำลังโหลด...</p>';
  try {
    if (!categories.length) {
      const c = await fetch(`${TBASE}/api/worklog/categories`).then(r => r.json()).catch(() => null);
      categories = (c && c.categories) || [];
    }
    const data = await fetch(`${TBASE}/api/worklog?date=${date}`).then(r => r.json());
    renderTable(data);
  } catch (e) {
    bodyEl.innerHTML = '<p class="sub" style="color:#b91c1c;">โหลดข้อมูลไม่สำเร็จ</p>';
  }
}

async function copyRecurring() {
  const btn = document.getElementById('wl-copy');
  btn.disabled = true;
  try {
    const d = await fetch(`${TBASE}/api/worklog/copy-recurring?date=${dateEl.value}`).then(r => r.json());
    if (!d.entries || !d.entries.length) { savedMsg.style.color = '#64748b'; savedMsg.textContent = 'ไม่พบงานประจำจากวันก่อน'; }
    else {
      let n = 0;
      for (const e of d.entries) {
        const tr = bodyEl.querySelector(`tr[data-hour="${e.hour}"]`);
        if (!tr) continue;
        const taskInp = tr.querySelector('input[data-field="task"]');
        if (taskInp.value.trim()) continue; // don't overwrite what you already typed
        taskInp.value = e.task;
        const sel = tr.querySelector('select[data-field="category"]');
        if (e.category && !categories.includes(e.category)) categories.push(e.category);
        sel.innerHTML = catOptions(e.category); sel.dataset.prev = e.category;
        const rec = tr.querySelector('.wl-rec');
        rec.setAttribute('data-on', '1'); rec.className = 'wl-rec on'; rec.textContent = '⟳ ประจำ';
        n++;
      }
      savedMsg.style.color = '#16a34a'; savedMsg.textContent = `คัดลอกมา ${n} งาน (จาก ${d.from || '-'})`;
      recomputeProgress();
    }
    setTimeout(() => { savedMsg.textContent = ''; savedMsg.style.color = '#16a34a'; }, 4000);
  } catch (e) { savedMsg.style.color = '#b91c1c'; savedMsg.textContent = 'คัดลอกไม่สำเร็จ'; }
  btn.disabled = false;
}

async function saveDay() {
  const btn = document.getElementById('wl-save');
  const entries = [...bodyEl.querySelectorAll('tr[data-hour]')].map(tr => ({
    hour: Number(tr.getAttribute('data-hour')),
    task: tr.querySelector('input[data-field="task"]').value,
    category: (v => v === ADD_NEW ? '' : v)(tr.querySelector('select[data-field="category"]').value),
    recurring: tr.querySelector('.wl-rec').getAttribute('data-on') === '1',
  }));
  btn.disabled = true; const old = btn.textContent; btn.textContent = 'กำลังบันทึก...';
  try {
    const r = await fetch(`${TBASE}/api/worklog`, {
      method: 'PUT', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ date: dateEl.value, entries }),
    });
    if (r.ok) { savedMsg.style.color = '#16a34a'; savedMsg.textContent = '✓ บันทึกแล้ว'; setTimeout(() => savedMsg.textContent = '', 3000); }
    else { const d = await r.json().catch(() => ({})); savedMsg.style.color = '#b91c1c'; savedMsg.textContent = d.error || 'บันทึกไม่สำเร็จ'; }
  } catch (e) { savedMsg.style.color = '#b91c1c'; savedMsg.textContent = 'เชื่อมต่อไม่สำเร็จ'; }
  btn.disabled = false; btn.textContent = old;
}

const remindEl = document.getElementById('wl-remind');
remindEl.checked = localStorage.getItem('worklog_remind') !== 'off';
remindEl.addEventListener('change', () => localStorage.setItem('worklog_remind', remindEl.checked ? 'on' : 'off'));

(async function init() {
  const me = await fetch(TBASE + '/api/me').then(r => r.json()).catch(() => null);
  if (me) document.getElementById('wl-emp').textContent =
    (me.name || me.username || '') + (me.position_name ? ' · ' + me.position_name : '') + (me.division_name ? ' · ' + me.division_name : '');
  const t = todayStr();
  dateEl.value = t; dateEl.max = t;
  dateEl.addEventListener('change', () => { if (dateEl.value > t) dateEl.value = t; loadDay(dateEl.value); });
  document.getElementById('wl-save').addEventListener('click', saveDay);
  document.getElementById('wl-copy').addEventListener('click', copyRecurring);
  loadDay(t);
})();
</script>
</body>
</html>
