<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard | AI Interviewer</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <script src="/i18n.js"></script>
</head>
<body>
<div class="container wide">
  <div class="topbar">
    <div class="logo"><img src="/logo.png" alt="JIANCHA" class="logo-img"/><span class="logo-sub" data-i18n="brand">AI Interviewer</span></div>
    <nav>
      <a href="/" data-i18n="nav_home">หน้าแรก</a>
      <a href="/examples" data-i18n="nav_examples">📘 ตัวอย่าง</a>
      <a href="/dashboard" data-i18n="nav_dashboard">Dashboard</a>
      <a href="/admin" data-i18n="nav_admin">🔐 Admin</a>
      <a href="#" onclick="(async()=>{await fetch('/api/logout',{method:'POST'});location.href='/login';})();return false;" data-i18n="nav_logout">ออกจากระบบ</a>
    </nav>
  </div>

  <h1 data-i18n="dash_h1">Dashboard ภาพรวมบริษัท</h1>
  <p class="sub" data-i18n="dash_sub">พนักงานทุกคน จัดตามฝ่าย · ใช้วิเคราะห์ภาพรวมและหาจุดปรับปรุง</p>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
      <div>
        <p class="sub" id="summary" style="margin:0;">...</p>
      </div>
      <div>
        <button id="analyze-btn" data-i18n="dash_analyze">🔍 วิเคราะห์ภาพรวมบริษัท</button>
        <a id="report-link" href="/api/outputs/_company/optimization-report.md" target="_blank" style="margin-left:8px; display:none;">
          <button class="ghost" data-i18n="dash_open_report">📄 เปิดรายงาน (.md)</button>
        </a>
      </div>
    </div>
  </div>

  <div id="divisions"></div>

  <div class="card">
    <h2 data-i18n="dash_report_h2">รายงาน Optimization ล่าสุด</h2>
    <div id="report-preview" class="empty" data-i18n="dash_no_report">ยังไม่มีรายงาน — กดปุ่ม "วิเคราะห์ภาพรวมบริษัท" ข้างบน</div>
  </div>
</div>

<script>
const T = (k, v) => (window.I18N ? window.I18N.t(k, v) : k);
function esc(s){return String(s||'').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function pill(s){
  if (s==='completed') return `<span class="pill green">${T('status_done')}</span>`;
  if (s==='in_progress') return `<span class="pill blue">${T('status_in_progress')}</span>`;
  return `<span class="pill gray">${T('status_not_started')}</span>`;
}

async function load() {
  const [divs, emps] = await Promise.all([
    fetch('/api/divisions').then(r => r.json()),
    fetch('/api/employees').then(r => r.json()),
  ]);

  const done = emps.filter(e => e.interviewStatus==='completed').length;
  document.getElementById('summary').textContent =
    `${divs.length} ${T('dash_summary_divs')} · ${emps.length} ${T('dash_summary_emps')} · ${T('dash_summary_done')} ${done} (${emps.length ? Math.round(done/emps.length*100) : 0}%)`;

  const byDiv = {};
  for (const e of emps) {
    const k = e.division_id || '_other';
    (byDiv[k] = byDiv[k] || []).push(e);
  }

  const container = document.getElementById('divisions');
  container.innerHTML = divs.map(d => {
    const list = byDiv[d.id] || [];
    if (!list.length) {
      return `<div class="card" style="border-top:4px solid ${esc(d.color)};">
        <h2>${esc(d.icon||'🏢')} ${esc(d.name)} <span class="pill gray" style="font-size:12px;">0 คน</span></h2>
        <p class="empty">ยังไม่มีพนักงาน · <a href="/division?id=${esc(d.id)}">เพิ่มพนักงาน →</a></p>
      </div>`;
    }
    const doneCount = list.filter(e => e.interviewStatus==='completed').length;
    return `<div class="card" style="border-top:4px solid ${esc(d.color)};">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <h2 style="margin:0;">${esc(d.icon||'🏢')} ${esc(d.name)}
          <span class="pill blue" style="font-size:12px;">${list.length} คน</span>
          ${doneCount ? `<span class="pill green" style="font-size:12px;">✓ ${doneCount}</span>` : ''}
        </h2>
        <a href="/division?id=${esc(d.id)}" style="font-size:14px;">จัดการฝ่ายนี้ →</a>
      </div>
      <table style="margin-top:12px;">
        <thead><tr><th>ชื่อ</th><th>ตำแหน่ง</th><th>แผนกย่อย</th><th>หน้าที่หลัก</th><th>สถานะ</th><th></th></tr></thead>
        <tbody>${list.map(e => `<tr>
          <td><strong>${esc(e.name)}</strong></td>
          <td>${esc(e.role)}</td>
          <td>${esc(e.department || '-')}</td>
          <td style="max-width:220px; font-size:13px; color:#475569;">${esc(e.primary_duty || '-')}</td>
          <td>${pill(e.interviewStatus)}</td>
          <td>
            ${e.interviewStatus==='completed'
              ? `<a class="row-btn ghost" href="/review?id=${e.id}">📄 ดูผล</a>`
              : `<a class="row-btn primary" href="/interview?id=${e.id}">▶ เริ่มอินเทอร์วิว</a>`}
            <button class="row-btn ghost del-btn" data-del-id="${esc(e.id)}" data-del-name="${esc(e.name)}" style="margin-left:6px;">🗑 ${T('dash_delete')}</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }).join('');

  // Wire delete buttons (admin only — endpoint enforces this server-side too)
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.delId;
      const name = btn.dataset.delName;
      if (!confirm(T('dash_delete_confirm', { name }))) return;
      btn.disabled = true;
      const r = await fetch('/api/interview/' + encodeURIComponent(id), { method: 'DELETE' });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) { alert(d.error || T('iv_error')); btn.disabled = false; return; }
      await load();
    });
  });

  // preload report
  try {
    const r = await fetch('/api/outputs/_company/optimization-report.md');
    if (r.ok) {
      const txt = await r.text();
      document.getElementById('report-preview').innerHTML =
        `<pre style="white-space:pre-wrap; font-family:inherit; font-size:14px; max-height:600px; overflow:auto;">${esc(txt)}</pre>`;
      document.getElementById('report-link').style.display = 'inline-block';
    }
  } catch {}
}

document.getElementById('analyze-btn').addEventListener('click', async () => {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = T('dash_analyzing');
  const r = await fetch('/api/company/analyze', { method: 'POST' });
  const data = await r.json();
  if (data.ok) {
    alert(`✓ ${data.count} — ${T('status_done')}`);
    await load();
  } else { alert(T('iv_error')); }
  btn.disabled = false; btn.textContent = T('dash_analyze');
});

load();
</script>
</body>
</html>
