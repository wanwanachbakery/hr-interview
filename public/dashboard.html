<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard | HR-Interview</title>
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <style>
    .div-block { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin:14px 0; border-top:4px solid var(--brand); }
    .sec-block { background:#f8fafc; border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin:10px 0; }
    .pos-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dashed #e2e8f0; }
    .pos-row:last-child { border-bottom:0; }
    .pos-label { font-size:14px; }
    .iv-status { display:inline-block; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:600; }
    .iv-vacant      { background:#f1f5f9; color:#475569; }
    .iv-not_started { background:#fef3c7; color:#92400e; }
    .iv-in_progress { background:#dbeafe; color:#1e40af; }
    .iv-completed   { background:#dcfce7; color:#166534; }
  </style>
<script>
  // Multi-tenant: derive /t/{tenantId} prefix from URL and apply to <a href="/...">
  window.TENANT_ID = (location.pathname.match(/^\/t\/([^/]+)/) || [])[1] || '';
  window.TBASE = window.TENANT_ID ? '/t/' + window.TENANT_ID : '';
  // Date helpers — Christian Era (ค.ศ.), DD/MM/YYYY, 24-hour HH:MM
  window.formatDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso); if (isNaN(d.getTime())) return '';
    const p = (n) => String(n).padStart(2, '0');
    return p(d.getDate()) + '/' + p(d.getMonth() + 1) + '/' + d.getFullYear();
  };
  window.formatTime = (iso) => {
    if (!iso) return '';
    const d = new Date(iso); if (isNaN(d.getTime())) return '';
    const p = (n) => String(n).padStart(2, '0');
    return p(d.getHours()) + ':' + p(d.getMinutes());
  };
  window.formatDateTime = (iso) => {
    if (!iso) return '';
    const d = window.formatDate(iso), t = window.formatTime(iso);
    return d && t ? d + ' ' + t : (d || t);
  };
  function shouldPrefix(href) {
    return href && href.startsWith('/')
      && !href.startsWith('/t/') && !href.startsWith('/super')
      && !href.startsWith('/styles') && !href.startsWith('/logo')
      && !href.startsWith('/i18n') && !href.startsWith('/favicon');
  }
  function rewriteLinks(root) {
    if (!window.TBASE || !root) return;
    // Self — handles addedNodes that ARE the <a> (e.g. innerHTML="<a>...</a>").
    // Only Element nodes have tagName; Document (nodeType 9) doesn't but still has querySelectorAll.
    if (root.nodeType === 1 && root.tagName === 'A' && shouldPrefix(root.getAttribute('href'))) {
      root.setAttribute('href', window.TBASE + root.getAttribute('href'));
    }
    // Descendants — both Document and Element expose querySelectorAll
    if (typeof root.querySelectorAll === 'function') {
      root.querySelectorAll('a[href^="/"]').forEach(a => {
        const h = a.getAttribute('href');
        if (shouldPrefix(h)) a.setAttribute('href', window.TBASE + h);
      });
    }
  }
  window.rewriteLinks = rewriteLinks;
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.TBASE) return;
    rewriteLinks(document);
    // Catch links inserted later via innerHTML/appendChild
    new MutationObserver(muts => {
      for (const m of muts) {
        // m.target is the element whose children changed — re-scan its subtree
        rewriteLinks(m.target);
        // m.addedNodes are the new direct children — also scan each (handles self-A case)
        for (const node of m.addedNodes) rewriteLinks(node);
      }
    }).observe(document.body, { childList: true, subtree: true });
    // Show tenant company name in topbar (next to the HR-Interview brand)
    const logo = document.querySelector('.topbar .logo');
    if (logo && !document.getElementById('tenant-company-name')) {
      const span = document.createElement('span');
      span.id = 'tenant-company-name';
      span.style.cssText = 'color:#0369a1; font-size:14px; font-weight:600; margin-left:12px; padding-left:12px; border-left:1px solid #cbd5e1;';
      span.textContent = '...';
      logo.appendChild(span);
      fetch(window.TBASE + '/api/company').then(r => r.ok ? r.json() : null).then(c => {
        span.textContent = c && c.name ? c.name : '';
        if (!c || !c.name) span.style.display = 'none';
      }).catch(() => { span.style.display = 'none'; });
    }
  });
</script>
</head>
<body>
<div class="container wide">
  <div class="topbar">
    <div class="logo"><span>HR-Interview</span></div>
    <nav>
      <a href="/">หน้าแรก</a>
      <a href="/profile">👤 โปรไฟล์</a>
      <a href="/dashboard">📋 Dashboard</a>
      <a href="/worklog">📝 บันทึกงาน</a>
      <a href="/reports">📊 รายงาน</a>
      <a href="/admin" id="nav-admin" style="display:none;">🔐 Admin</a>
      <a href="#" onclick="(async()=>{await fetch(TBASE + '/api/logout',{method:'POST'});location.href = TBASE + '/login';})();return false;">ออกจากระบบ</a>
    </nav>
  </div>

  <h1>📋 สถานะ Interview ตามตำแหน่ง</h1>
  <p class="sub">ดูทุกตำแหน่งในขอบเขตของคุณ · ใครครองตำแหน่ง · สถานะ interview ของแต่ละคน</p>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
      <p class="sub" id="summary" style="margin:0;">กำลังโหลด...</p>
      <div id="analyze-zone"></div>
    </div>
  </div>

  <div id="tree"></div>

  <div class="card" id="report-card" style="display:none;">
    <h2 style="margin-top:0;">รายงาน Optimization ล่าสุด</h2>
    <div id="report-preview" class="empty">กดปุ่ม "วิเคราะห์ภาพรวมบริษัท" ข้างบน</div>
  </div>
</div>

<script>
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const STATUS_LABEL = {
  not_started:'ยังไม่ตอบ', in_progress:'กำลังตอบ', completed:'เสร็จ',
};

let ME;

async function load() {
  const [me, divs, secs, poss, emps] = await Promise.all([
    fetch(TBASE + '/api/me').then(r => r.json()),
    fetch(TBASE + '/api/divisions').then(r => r.json()),
    fetch(TBASE + '/api/sections').then(r => r.json()),
    fetch(TBASE + '/api/positions').then(r => r.json()),
    fetch(TBASE + '/api/employees').then(r => r.json()),  // active only
  ]);
  ME = me;
  if (me.role === 'admin') document.getElementById('nav-admin').style.display = 'inline';

  // Summary
  const totalEmps = emps.length;
  const completed = emps.filter(e => e.interviewStatus === 'completed').length;
  const inProgress = emps.filter(e => e.interviewStatus === 'in_progress').length;
  const pct = totalEmps ? Math.round(completed / totalEmps * 100) : 0;
  document.getElementById('summary').innerHTML =
    `${divs.length} ฝ่าย · ${poss.length} ตำแหน่ง · มีคนครอง ${totalEmps} · เสร็จ ${completed} (${pct}%) · กำลังตอบ ${inProgress}`;

  // Analyze button — admin/exec/manager only
  if (['admin','executive','manager'].includes(me.role)) {
    document.getElementById('analyze-zone').innerHTML = `
      <button id="analyze-btn">🔍 วิเคราะห์ภาพรวมบริษัท</button>
      <a id="report-link" href="/api/outputs/_company/optimization-report.md" target="_blank" style="margin-left:8px; display:none;">
        <button class="ghost">📄 เปิดรายงาน</button>
      </a>
    `;
    document.getElementById('analyze-btn').addEventListener('click', runAnalyze);
  }

  // Build tree: division -> section -> position (+ incumbent emp if any)
  const empByPos = Object.fromEntries(emps.map(e => [e.position_id, e]));
  const tree = document.getElementById('tree');
  if (divs.length === 0) {
    tree.innerHTML = '<div class="card empty">ไม่มีฝ่ายในขอบเขตของคุณ</div>';
    return;
  }
  tree.innerHTML = divs.map(d => {
    const secsInDiv = secs.filter(s => s.division_id === d.id);
    if (!secsInDiv.length) {
      return `<div class="div-block" style="border-top-color:${esc(d.color)}">
        <h2 style="margin:0 0 4px;">${esc(d.icon || '🏢')} ${esc(d.name)}</h2>
        <p class="empty" style="padding:8px;">– ยังไม่มีแผนก –</p>
      </div>`;
    }
    return `<div class="div-block" style="border-top-color:${esc(d.color)}">
      <h2 style="margin:0 0 12px;">${esc(d.icon || '🏢')} ${esc(d.name)}</h2>
      ${secsInDiv.map(s => {
        const posInSec = poss.filter(p => p.section_id === s.id);
        if (!posInSec.length) {
          return `<div class="sec-block"><strong>📋 ${esc(s.name)}</strong> <span class="empty">– ยังไม่มีตำแหน่ง –</span></div>`;
        }
        return `<div class="sec-block">
          <strong>📋 ${esc(s.name)}</strong>
          <div style="margin-top:6px;">
            ${posInSec.map(p => {
              const e = empByPos[p.id];
              if (!e) {
                return `<div class="pos-row">
                  <div class="pos-label">👤 ${esc(p.name)}</div>
                  <div><span class="iv-status iv-vacant">ตำแหน่งว่าง</span>
                    ${ME.role === 'admin' || ME.role === 'executive'
                      ? `<a href="/position-history?id=${esc(p.id)}" style="font-size:12px; margin-left:8px;">ประวัติ</a>` : ''}
                  </div>
                </div>`;
              }
              const statusKey = e.interviewStatus || 'not_started';
              const statusTxt = STATUS_LABEL[statusKey] || statusKey;
              const link = statusKey === 'completed'
                ? `<a href="/review?id=${esc(e.id)}" style="font-size:12px; margin-left:8px;">📄 ดูเอกสาร</a>`
                : (e.user_id === ME.user_id
                    ? `<a href="/interview?id=${esc(e.id)}" style="font-size:12px; margin-left:8px;">▶ ตอบของฉัน</a>`
                    : '');
              const delBtn = ME.role === 'admin'
                ? `<button class="ghost del-btn" style="font-size:12px; padding:2px 8px; margin-left:8px;" data-id="${esc(e.id)}" data-name="${esc(e.name)}">🗑</button>`
                : '';
              return `<div class="pos-row">
                <div class="pos-label">👤 ${esc(p.name)} <span style="color:#475569;">→ ${esc(e.name)}</span></div>
                <div><span class="iv-status iv-${statusKey}">${esc(statusTxt)}</span>${link}${delBtn}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  // Wire delete buttons (admin only)
  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      if (!confirm(`ลบ "${btn.dataset.name}" และ interview ทั้งหมด?`)) return;
      btn.disabled = true;
      const r = await fetch(TBASE + '/api/interview/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!r.ok) { const d = await r.json().catch(() => ({})); alert('ลบไม่ได้: ' + (d.error || 'unknown')); btn.disabled = false; return; }
      await load();
    });
  });

  // preload report
  try {
    const r = await fetch(TBASE + '/api/outputs/_company/optimization-report.md');
    if (r.ok) {
      const txt = await r.text();
      document.getElementById('report-card').style.display = 'block';
      document.getElementById('report-preview').innerHTML =
        `<pre style="white-space:pre-wrap; font-family:inherit; font-size:14px; max-height:600px; overflow:auto;">${esc(txt)}</pre>`;
      const link = document.getElementById('report-link');
      if (link) link.style.display = 'inline-block';
    }
  } catch {}
}

async function runAnalyze() {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true; btn.textContent = '⏳ กำลังวิเคราะห์...';
  const r = await fetch(TBASE + '/api/company/analyze', { method: 'POST' });
  const data = await r.json();
  if (data.ok) { alert(`✓ วิเคราะห์เสร็จ — มี ${data.count} interview ที่ตอบครบ`); await load(); }
  else { alert('ผิดพลาด: ' + (data.error || 'unknown')); }
  btn.disabled = false; btn.textContent = '🔍 วิเคราะห์ภาพรวมบริษัท';
}

load();
</script>
</body>
</html>
